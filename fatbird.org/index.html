<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fatbird.org</title>

    <link rel="stylesheet" href="style.css">
    <script>
        let current = 1;
        const total = 8;
        
        function showSlide(n) {
            if (n > total) current = 1;
            else if (n < 1) current = total;
            else current = n;
        
            document.getElementById("fanart-slide").src =
                `fanart/fanart${current}.jpeg`;
        }
        
        function nextSlide() {
            showSlide(current + 1);
        }
        
        function prevSlide() {
            showSlide(current - 1);
        }
    </script>
</head>
<body>
    
    <img src="a559022601b5419920431923e59b5ec6.jpg" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
">
    
    <header class="topbar">
        <div class="logo">fatbird.org</div>

        <nav class="nav-buttons">
            <button onclick="location.href='#fanart'">Fanart</button>
            <button onclick="location.href='#info'">Info</button>
            <button onclick="location.href='#people'">People</button>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Welcome to fatbird.org</h1>
            <p>The official home of Fatbird.</p>
        </section>

        <section id="fanart" class="card">
            <h2>Fanart</h2>
            <div class="slideshow">
                <img id="fanart-slide" src="fanart1.jpeg" alt="Fanart">
                <div class="controls">
                        <button onclick="prevSlide()">◀</button>
                        <button onclick="nextSlide()">▶</button>
                </div>
            </div>
        </section>

        <section id="info" class="card">
            <h2>Info</h2>
            <p>Information about Fatbird, updates, and lore.</p>
        </section>

        <section id="people" class="card">
            <h2>People</h2>
            <p>Meet the people behind the project.</p>
        </section>
    </main>

</body>
</html>
