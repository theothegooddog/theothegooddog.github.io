<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
background:#0e0e0e;
color:#aaa;
text-align:center;
margin:0;
padding:3rem;
}

.panel{
background:#181818;
padding:20px;
border-radius:10px;
max-width:600px;
margin:20px auto;
}

#countdown{
font-size:2rem;
color:#6ee7ff;
margin:10px 0;
}

li{
list-style:none;
padding:6px;
}

</style>
</head>

<body>

<h1>Movie Dashboard</h1>

<div class="panel">

<h2>Next Meeting In</h2>

<div id="countdown">Loading...</div>

</div>

<div class="panel">

<h2>Upcoming Meetings</h2>

<ul id="meetingList"></ul>

</div>

<script>

let meetings=[]
let nextMeeting=null

async function loadMeetings(){

let res=await fetch("/times.json")
let data=await res.json()

meetings=data.meetings.map(t=>new Date(t))

meetings.sort((a,b)=>a-b)

let now=new Date()

nextMeeting=meetings.find(m=>m>now)

renderList()

}

function renderList(){

let list=document.getElementById("meetingList")

list.innerHTML=""

meetings.forEach(m=>{

let li=document.createElement("li")

li.textContent=m.toLocaleString()

list.appendChild(li)

})

}

function updateCountdown(){

if(!nextMeeting)return

let now=new Date()

let diff=nextMeeting-now

if(diff<0){
document.getElementById("countdown").textContent="Meeting happening now!"
return
}

let s=Math.floor(diff/1000)%60
let m=Math.floor(diff/1000/60)%60
let h=Math.floor(diff/1000/60/60)%24
let d=Math.floor(diff/1000/60/60/24)

document.getElementById("countdown").textContent=
`${d}d ${h}h ${m}m ${s}s`

}

loadMeetings()

setInterval(updateCountdown,1000)

</script>

</body>
</html>
